<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Reveal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #050505;
        }

        /* Corrected: Use Flexbox on body to center the entire wrapper */
        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
            perspective: 1200px;
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* Added: A fixed-size container to keep all pages in one spot */
        #ui-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .gold-gradient {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #D4AF37, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Fixed: Centering for absolute elements */
        .page {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 400px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .page.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        #scratch-mask {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.9);
            z-index: 50;
            opacity: 0;
            transition: opacity 1s ease;
            justify-content: center;
            align-items: center;
        }

        #scratch-mask.visible {
            display: flex;
            opacity: 1;
        }

        #card-frame {
            position: relative;
            width: 85vw;
            max-width: 360px;
            aspect-ratio: 9 / 16; 
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 1);
            border: 2px solid var(--gold);
            background: #111;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        #main-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        #foil-overlay {
            position: absolute;
            inset: 0;
            z-index: 60;
            background: linear-gradient(135deg, #A0A0A0, #F8F8F8, #707070);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .foil-melt {
            opacity: 0 !important;
            transform: scale(1.1) rotate(2deg);
            filter: blur(20px);
            pointer-events: none;
        }

        .btn-luxury {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            padding: 14px 36px;
            border-radius: 50px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <audio id="scratch-audio">
        <source src="https://assets.mixkit.co/active_storage/sfx/1169/1169-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="ui-wrapper">
        <div id="page-0" class="page active">
            <div class="glass-panel p-8 w-full">
                <h1 class="serif italic text-3xl mb-10 gold-gradient">Hey baby, it’s been a month since 20th Feb 2026</h1>
                <button onclick="requestMotionPermission()" class="btn-luxury">Start Experience</button>
            </div>
        </div>

        <div id="page-1" class="page">
            <p class="serif text-2xl leading-relaxed gold-gradient">Since the day you came in to my life...</p>
            <button onclick="goToPage(2)" class="btn-luxury mt-16">Next</button>
        </div>

        <div id="page-2" class="page">
            <p class="serif text-2xl leading-relaxed">...you have shown me Hope in life</p>
            <button onclick="goToPage(3)" class="btn-luxury mt-16">Next</button>
        </div>

        <div id="page-3" class="page">
            <p class="serif text-2xl leading-relaxed gold-gradient">This is something small for you baby</p>
            <button onclick="goToPage(4)" class="btn-luxury mt-16">Next</button>
        </div>

        <div id="page-4" class="page">
            <p class="serif text-2xl leading-relaxed">I love you Baby ❤️</p>
            <button onclick="revealScratchCard()" class="btn-luxury mt-16 font-bold border-2">Let's Reveal</button>
        </div>
    </div>

    <div id="scratch-mask">
        <div id="hold-instruction" class="absolute z-[70] top-20 text-center transition-opacity duration-500">
            <p class="serif italic text-lg gold-gradient">Hold to reveal</p>
            <div class="mt-4 w-10 h-10 border-2 border-gold/40 rounded-full mx-auto animate-ping"></div>
        </div>

        <div id="card-frame">
            <img id="main-photo" src="us.png" alt="Hidden Memory">
            <div id="foil-overlay">
                <div class="text-center px-6">
                     <p class="serif italic font-bold text-[#333] text-lg">A memory frozen in time...</p>
                     <p class="mt-4 text-[10px] tracking-[4px] font-bold text-[#555] uppercase">Hold to Reveal</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        let holdTimer;
        let isRevealed = false;
        const scratchSfx = document.getElementById('scratch-audio');

        function requestMotionPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') window.addEventListener('deviceorientation', handleMotion);
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleMotion);
            }
            goToPage(1);
        }

        function handleMotion(e) {
            const card = document.getElementById('card-frame');
            if (!card) return;
            const rX = (e.beta - 45) * 0.25; 
            const rY = e.gamma * -0.25;
            card.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
        }

        function goToPage(index) {
            const current = document.getElementById(`page-${currentIdx}`);
            const next = document.getElementById(`page-${index}`);
            current.classList.remove('active');
            setTimeout(() => {
                next.classList.add('active');
                currentIdx = index;
            }, 600);
        }

        function revealScratchCard() {
            document.getElementById(`page-4`).classList.remove('active');
            setTimeout(() => {
                const mask = document.getElementById('scratch-mask');
                mask.style.display = 'flex';
                requestAnimationFrame(() => {
                    mask.classList.add('visible');
                    setupHoldInteraction();
                });
            }, 800);
        }

        function setupHoldInteraction() {
            const frame = document.getElementById('card-frame');
            const foil = document.getElementById('foil-overlay');
            const instruction = document.getElementById('hold-instruction');

            const startHold = (e) => {
                e.preventDefault();
                foil.classList.add('foil-melt');
                instruction.style.opacity = "0";
                scratchSfx.play().catch(()=>{});
                holdTimer = setTimeout(() => { completeReveal(); }, 1500);
            };

            const endHold = () => {
                clearTimeout(holdTimer);
                if (isRevealed) return;
                foil.classList.remove('foil-melt');
                instruction.style.opacity = "1";
                scratchSfx.pause();
                scratchSfx.currentTime = 0;
            };

            frame.addEventListener('mousedown', startHold);
            frame.addEventListener('touchstart', startHold);
            window.addEventListener('mouseup', endHold);
            window.addEventListener('touchend', endHold);
        }

        function completeReveal() {
            isRevealed = true;
            document.getElementById('hold-instruction').style.display = 'none';
            scratchSfx.pause();
            const end = Date.now() + 4000;
            const colors = ['#D4AF37', '#FFFFFF', '#AA771C'];
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
