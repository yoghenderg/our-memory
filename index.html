<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Reveal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #856404;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            /* Added for 3D depth */
            perspective: 1000px;
        }

        .serif { font-family: 'Playfair Display', serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .gold-gradient {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #D4AF37, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 10;
        }

        .page.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        #scratch-mask {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.85);
            z-index: 50;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #scratch-mask.visible {
            display: flex;
            opacity: 1;
            justify-content: center;
            align-items: center;
        }

        #card-frame {
            position: relative;
            width: 85%;
            max-width: 380px;
            aspect-ratio: 9 / 16; 
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.9);
            border: 2px solid var(--gold);
            background: #111;
            /* Added for smooth 3D tilting */
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        #main-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        #foil-overlay {
            position: absolute;
            inset: 0;
            z-index: 60;
            background: linear-gradient(135deg, #A0A0A0, #F8F8F8, #707070);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .foil-melt {
            opacity: 0 !important;
            transform: scale(1.1) rotate(2deg);
            filter: blur(20px);
            pointer-events: none;
        }

        .btn-luxury {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            padding: 12px 32px;
            border-radius: 50px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-luxury:active {
            transform: scale(0.95);
            background: rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body>

    <audio id="scratch-audio">
        <source src="https://assets.mixkit.co/active_storage/sfx/1169/1169-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="ui-wrapper">
        <div id="page-0" class="page active">
            <div class="glass-panel p-10 max-w-xs w-full">
                <h1 class="serif italic text-3xl mb-10 gold-gradient">A secret, just for you...</h1>
                <button onclick="requestMotionPermission()" class="btn-luxury">Start Experience</button>
            </div>
        </div>

        <div id="page-1" class="page">
            <p class="serif text-2xl leading-relaxed max-w-md gold-gradient">Every moment we've shared together...</p>
            <button onclick="goToPage(2)" class="btn-luxury mt-16">Next</button>
        </div>

        <div id="page-2" class="page">
            <p class="serif text-2xl leading-relaxed max-w-md">...has led to this very second.</p>
            <button onclick="goToPage(3)" class="btn-luxury mt-16">Next</button>
        </div>

        <div id="page-3" class="page">
            <p class="serif text-2xl leading-relaxed max-w-md gold-gradient">The world is simply brighter because of you.</p>
            <button onclick="goToPage(4)" class="btn-luxury mt-16">Next</button>
        </div>

        <div id="page-4" class="page">
            <p class="serif text-2xl leading-relaxed max-w-md">Now, I have something special to show you.</p>
            <button onclick="revealScratchCard()" class="btn-luxury mt-16 font-bold border-2">Let's Reveal</button>
        </div>
    </div>

    <div id="scratch-mask">
        <div id="hold-instruction" class="absolute z-[70] text-center pointer-events-none transition-opacity duration-500">
            <p class="serif italic text-lg gold-gradient">Hold to reveal your secret...</p>
            <div class="mt-4 w-12 h-12 border-2 border-gold/50 rounded-full mx-auto animate-ping"></div>
        </div>

        <div id="card-frame">
            <img id="main-photo" src="us.png" alt="Hidden Memory">
            
            <div id="foil-overlay">
                <div class="text-center px-4">
                     <p class="serif italic font-bold text-[#4a4a4a] text-lg">A memory frozen in time...</p>
                     <p class="mt-2 text-[10px] tracking-[4px] font-bold text-[#5a4a2a] uppercase">Press & Hold to Reveal</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        let holdTimer;
        let isRevealed = false;
        const scratchSfx = document.getElementById('scratch-audio');

        // iOS Motion Permission Logic
        function requestMotionPermission() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleMotion);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleMotion);
            }
            goToPage(1);
        }

        // Parallax Movement Logic
        function handleMotion(event) {
            const card = document.getElementById('card-frame');
            if (!card) return;

            // Beta (tilt front-to-back) and Gamma (tilt left-to-right)
            // Adjusting beta by 45 assuming a natural holding angle
            const rotateX = (event.beta - 45) * 0.2; 
            const rotateY = event.gamma * -0.2;

            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }

        function goToPage(index) {
            const current = document.getElementById(`page-${currentIdx}`);
            const next = document.getElementById(`page-${index}`);
            current.classList.remove('active');
            setTimeout(() => {
                next.classList.add('active');
                currentIdx = index;
            }, 600);
        }

        function revealScratchCard() {
            document.getElementById(`page-4`).classList.remove('active');
            setTimeout(() => {
                const mask = document.getElementById('scratch-mask');
                mask.style.display = 'flex';
                requestAnimationFrame(() => {
                    mask.classList.add('visible');
                    setupHoldInteraction();
                });
            }, 800);
        }

        function setupHoldInteraction() {
            const frame = document.getElementById('card-frame');
            const foil = document.getElementById('foil-overlay');
            const instruction = document.getElementById('hold-instruction');

            const startHold = (e) => {
                e.preventDefault();
                foil.classList.add('foil-melt');
                instruction.style.opacity = "0";
                scratchSfx.play().catch(()=>{});

                holdTimer = setTimeout(() => {
                    completeReveal();
                }, 1500);
            };

            const endHold = () => {
                clearTimeout(holdTimer);
                if (isRevealed) return;
                
                foil.classList.remove('foil-melt');
                instruction.style.opacity = "1";
                scratchSfx.pause();
                scratchSfx.currentTime = 0;
            };

            frame.addEventListener('mousedown', startHold);
            frame.addEventListener('touchstart', startHold);
            window.addEventListener('mouseup', endHold);
            window.addEventListener('touchend', endHold);
        }

        function completeReveal() {
            isRevealed = true;
            const instruction = document.getElementById('hold-instruction');
            if(instruction) instruction.style.display = 'none';
            scratchSfx.pause();

            const end = Date.now() + 4500;
            const luxuryColors = ['#D4AF37', '#FBF5B7', '#FFFFFF'];

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60, spread: 70,
                    origin: { x: 0, y: 0.8 },
                    colors: luxuryColors, zIndex: 999
                });
                confetti({
                    particleCount: 5,
                    angle: 120, spread: 70,
                    origin: { x: 1, y: 0.8 },
                    colors: luxuryColors, zIndex: 999
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
